{% extends "base.html" %} {% block title %}Dashboard - Portfolio Manager{%
endblock %} {% block content %}
<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Dashboard</h1>
    <button class="btn btn-primary" id="add-portfolio-btn">
      + New Portfolio
    </button>
  </div>

  <div class="loading" id="loading" style="display: none">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <div class="error-message" id="error-message" style="display: none"></div>

  <!-- Portfolios Section -->
  <section class="portfolios-section">
    <h2>Your Portfolios</h2>
    <div id="portfolios-container" class="portfolios-grid">
      <p id="no-portfolios" class="empty-state">
        No portfolios yet. Create one to get started!
      </p>
    </div>
  </section>

  <!-- Portfolio Modal -->
  <div id="portfolio-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2 id="modal-title">Create New Portfolio</h2>
      <form id="portfolio-form">
        <div class="form-group">
          <label for="portfolio-name">Portfolio Name *</label>
          <input
            type="text"
            id="portfolio-name"
            required
            placeholder="e.g., My Retirement Fund"
          />
        </div>
        <div class="form-group">
          <label for="portfolio-owner">Owner Name *</label>
          <input
            type="text"
            id="portfolio-owner"
            required
            placeholder="e.g., John Doe"
          />
        </div>
        <div class="form-group">
          <label for="portfolio-description">Description</label>
          <textarea
            id="portfolio-description"
            placeholder="Add a description..."
          ></textarea>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn btn-secondary" id="cancel-portfolio">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">Save Portfolio</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Investment Modal -->
  <div id="investment-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Add Investment</h2>
      <form id="investment-form">
        <input type="hidden" id="investment-portfolio-id" />
        <input type="hidden" id="investment-id" />
        <div class="form-group">
          <label for="investment-ticker">Ticker Symbol *</label>
          <input
            type="text"
            id="investment-ticker"
            required
            placeholder="e.g., AAPL"
            maxlength="10"
          />
        </div>
        <div class="form-group">
          <label for="investment-name">Company Name *</label>
          <input
            type="text"
            id="investment-name"
            required
            placeholder="e.g., Apple Inc."
          />
        </div>
        <div class="form-group">
          <label for="investment-sector">Sector</label>
          <input
            type="text"
            id="investment-sector"
            placeholder="e.g., Technology"
          />
        </div>
        <div class="form-group">
          <label for="investment-quantity">Quantity *</label>
          <input
            type="number"
            id="investment-quantity"
            required
            step="0.01"
            min="0"
            placeholder="e.g., 10"
          />
        </div>
        <div class="form-group">
          <label for="investment-purchase-price">Purchase Price ($) *</label>
          <input
            type="number"
            id="investment-purchase-price"
            required
            step="0.01"
            min="0"
            placeholder="e.g., 150.50"
          />
        </div>
        <div class="form-group">
          <label for="investment-current-price">Current Price ($) *</label>
          <input
            type="number"
            id="investment-current-price"
            required
            step="0.01"
            min="0"
            placeholder="e.g., 175.80"
          />
        </div>
        <div class="form-group">
          <label for="investment-notes">Notes</label>
          <textarea
            id="investment-notes"
            placeholder="Add notes about this investment..."
          ></textarea>
        </div>
        <div class="modal-buttons">
          <button
            type="button"
            class="btn btn-secondary"
            id="cancel-investment"
          >
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">Save Investment</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %} {% block scripts %}
<script src="/static/js/dashboard.js"></script>
{% endblock %}
