name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Test job
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with pylint
        working-directory: ./backend
        run: |
          pip install pylint
          python -m pylint app/ --exit-zero || true

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_db
        run: |
          pip install pytest pytest-asyncio
          python -m pytest tests/ -v || echo "No tests found"

  # Build and push Docker image
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # Deploy to EC2
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DOCKER_REGISTRY: ${{ env.REGISTRY }}
          DOCKER_IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DOCKER_IMAGE_TAG: latest
        run: |
          ssh -i ~/.ssh/ec2-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          cd /opt/portfolio-app || mkdir -p /opt/portfolio-app && cd /opt/portfolio-app
          
          # Create .env file
          cat > .env << 'ENVFILE'
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DB_NAME=${DB_NAME}
          DEBUG=False
          LOG_LEVEL=INFO
          DOCKER_REGISTRY=${DOCKER_REGISTRY}
          DOCKER_IMAGE_NAME=${DOCKER_IMAGE_NAME}
          DOCKER_IMAGE_TAG=${DOCKER_IMAGE_TAG}
          ENVFILE
          
          # Login to registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true
          
          # Pull latest image
          docker pull ${DOCKER_REGISTRY}/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG} || true
          
          # Stop existing containers
          docker compose down || true
          
          # Create minimal docker-compose.yml for deployment
          cat > docker-compose.yml << 'COMPOSEFILE'
          services:
            db:
              image: postgres:15-alpine
              container_name: portfolio_db
              environment:
                POSTGRES_USER: ${DB_USER:-postgres}
                POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
                POSTGRES_DB: ${DB_NAME:-portfolio_db}
              volumes:
                - postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
                interval: 10s
                timeout: 5s
                retries: 5
              restart: unless-stopped
              networks:
                - portfolio_network

            app:
              image: ${DOCKER_REGISTRY}/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG}
              container_name: portfolio_app
              environment:
                DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-portfolio_db}
                DEBUG: False
                LOG_LEVEL: INFO
              depends_on:
                db:
                  condition: service_healthy
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 10s
              restart: unless-stopped
              networks:
                - portfolio_network

            nginx:
              image: nginx:alpine
              container_name: portfolio_nginx
              ports:
                - "80:80"
                - "443:443"
              volumes:
                - ./nginx.conf:/etc/nginx/nginx.conf:ro
              depends_on:
                - app
              healthcheck:
                test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
                interval: 30s
                timeout: 10s
                retries: 3
              restart: unless-stopped
              networks:
                - portfolio_network

          volumes:
            postgres_data:
              driver: local

          networks:
            portfolio_network:
              driver: bridge
          COMPOSEFILE
          
          # Create nginx config
          mkdir -p nginx
          cat > nginx.conf << 'NGINXFILE'
          user nginx;
          worker_processes auto;
          error_log /var/log/nginx/error.log warn;
          pid /var/run/nginx.pid;

          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;
              log_format main '$remote_addr - $remote_user [$time_local] "$request" $status';
              access_log /var/log/nginx/access.log main;

              upstream fastapi_backend {
                  server app:8000;
              }

              server {
                  listen 80;
                  server_name _;

                  location /health {
                      access_log off;
                      return 200 "healthy\n";
                      add_header Content-Type text/plain;
                  }

                  location / {
                      proxy_pass http://fastapi_backend;
                      proxy_http_version 1.1;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
              proxy_connect_timeout 60s;
                      proxy_send_timeout 60s;
                      proxy_read_timeout 60s;
                  }
              }
          }
          NGINXFILE
          
          # Start containers
          docker compose up -d
          
          # Wait for services
          echo "Waiting for services to be healthy..."
          sleep 10
          EOF

      - name: Health Check
        run: |
          max_attempts=60
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            if curl -fsS --connect-timeout 5 --max-time 15 "http://${{ secrets.EC2_HOST }}/health" >/dev/null 2>&1; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "⏳ Health check failed (attempt $attempt/$max_attempts)..."
            sleep 2
            attempt=$((attempt + 1))
          done
          echo "✗ Health check failed after all attempts"
          echo "Debugging info:"
          ssh -i ~/.ssh/ec2-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "docker compose ps || true" || true
          ssh -i ~/.ssh/ec2-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "docker logs portfolio_app 2>&1 | tail -50 || true" || true
          exit 1

      - name: Cleanup SSH
        if: always()
        run: |
          rm -f ~/.ssh/ec2-key.pem

      - name: Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping Slack notification."
            exit 0
          fi
          STATUS="✓ Success"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="✗ Failed"
          fi
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"Portfolio Manager Deployment\n${STATUS}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\"}" \
            "$SLACK_WEBHOOK_URL" || true
