name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Code Quality Checks job
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint

      - name: Check code style with Black
        working-directory: ./backend
        run: |
          black --check app/ || echo "Black formatting issues found"
        continue-on-error: true

      - name: Check import sorting with isort
        working-directory: ./backend
        run: |
          isort --check-only app/ || echo "Import sorting issues found"
        continue-on-error: true

      - name: Lint with Flake8
        working-directory: ./backend
        run: |
          flake8 app/ tests/ --max-line-length=100 --ignore=E501,W503 --count --statistics > flake8-report.txt || true
        continue-on-error: true

      - name: Static analysis with Pylint
        working-directory: ./backend
        run: |
          pylint app/ --disable=all --enable=E,F --exit-zero || true
        continue-on-error: true

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: backend/flake8-report.txt
          retention-days: 30

  # Test job
  test:
    needs: lint
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_db
        run: |
          python -m pytest tests/ -v --cov=app --cov-report=xml --cov-report=html --cov-report=term || echo "No tests found"
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: unittests-py${{ matrix.python-version }}
          name: codecov-py${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            backend/htmlcov/
            backend/.coverage
            backend/coverage.xml
          retention-days: 30

  # Build and push Docker image
  build-and-push:
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # Deploy to EC2
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Deploy with environment variables exported
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/ec2-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'EOFSCRIPT'
          set -e
          
          # Export environment variables
          export DB_USER="${{ secrets.DB_USER }}"
          export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          export DB_NAME="${{ secrets.DB_NAME }}"
          export REGISTRY="${{ env.REGISTRY }}"
          export IMAGE_NAME="${{ env.IMAGE_NAME }}"
          export GITHUB_ACTOR="${{ github.actor }}"
          export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          
          # Create app directory
          sudo mkdir -p /opt/portfolio-app
          sudo chown "$USER:$USER" /opt/portfolio-app
          cd /opt/portfolio-app
          
          # Force remove old containers
          docker compose down --remove-orphans -v 2>/dev/null || true
          docker rm -f portfolio_db portfolio_app portfolio_nginx 2>/dev/null || true
          
          # Create .env file with actual values
          cat > .env << ENVEOF
          DB_USER=${DB_USER:-postgres}
          DB_PASSWORD=${DB_PASSWORD:-postgres}
          DB_NAME=${DB_NAME:-portfolio_db}
          DEBUG=False
          LOG_LEVEL=INFO
          ENVEOF
          
          # Login to registry
          echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "$GITHUB_ACTOR" --password-stdin || true
          
          # Pull latest image
          FULL_IMAGE="${REGISTRY}/${IMAGE_NAME}:latest"
          echo "Pulling image: $FULL_IMAGE"
          docker pull "$FULL_IMAGE" || echo "Image pull failed, will try to proceed"
          
          # Create docker-compose.yml
          cat > docker-compose.yml << 'COMPOSEFILE'
          services:
            db:
              image: postgres:15-alpine
              container_name: portfolio_db
              environment:
                POSTGRES_USER: ${DB_USER:-postgres}
                POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
                POSTGRES_DB: ${DB_NAME:-portfolio_db}
              volumes:
                - postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
                interval: 10s
                timeout: 5s
                retries: 5
              restart: unless-stopped
              networks:
                - portfolio_network

            app:
              image: ${REGISTRY}/${IMAGE_NAME}:latest
              container_name: portfolio_app
              environment:
                DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-portfolio_db}
                DEBUG: False
                LOG_LEVEL: INFO
              depends_on:
                db:
                  condition: service_healthy
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 10s
              restart: unless-stopped
              networks:
                - portfolio_network

            nginx:
              image: nginx:alpine
              container_name: portfolio_nginx
              ports:
                - "80:80"
                - "443:443"
              volumes:
                - ./nginx.conf:/etc/nginx/nginx.conf:ro
              depends_on:
                - app
              healthcheck:
                test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
                interval: 30s
                timeout: 10s
                retries: 3
              restart: unless-stopped
              networks:
                - portfolio_network

          volumes:
            postgres_data:
              driver: local

          networks:
            portfolio_network:
              driver: bridge
          COMPOSEFILE
          
          # Create nginx config
          cat > nginx.conf << 'NGINXFILE'
          user nginx;
          worker_processes auto;
          error_log /var/log/nginx/error.log warn;
          pid /var/run/nginx.pid;

          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;
              log_format main '$remote_addr - $remote_user [$time_local] "$request" $status';
              access_log /var/log/nginx/access.log main;

              upstream fastapi_backend {
                  server app:8000;
              }

              server {
                  listen 80;
                  server_name _;

                  location /health {
                      access_log off;
                      return 200 "healthy\n";
                      add_header Content-Type text/plain;
                  }

                  location / {
                      proxy_pass http://fastapi_backend;
                      proxy_http_version 1.1;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                      proxy_connect_timeout 60s;
                      proxy_send_timeout 60s;
                      proxy_read_timeout 60s;
                  }
              }
          }
          NGINXFILE
          
          # Start containers
          docker compose up -d
          
          # Wait for services
          echo "Waiting for services to be healthy..."
          sleep 10
          EOFSCRIPT

      - name: Health Check
        run: |
          max_attempts=60
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Health check attempt $attempt/$max_attempts..."
            if curl -fsS --connect-timeout 5 --max-time 15 "http://${{ secrets.EC2_HOST }}/health" >/dev/null 2>&1; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "⏳ Waiting..."
            sleep 2
            attempt=$((attempt + 1))
          done
          echo "✗ Health check failed after all attempts"
          echo "Debugging: Checking container status..."
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/ec2-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cd /opt/portfolio-app && docker compose ps && docker compose logs --tail=50 || true" || true
          exit 1

      - name: Cleanup SSH
        if: always()
        run: |
          rm -f ~/.ssh/ec2-key.pem

  # Cleanup job
  cleanup:
    name: Cleanup & Artifact Management
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove old artifacts
        run: |
          echo "Cleaning up old workflow artifacts..."
          # This step documents cleanup; GitHub Actions automatically manages artifact retention
          echo "✓ Artifacts will be retained according to retention-days policy"

      - name: Clear workflow cache (optional)
        run: |
          echo "Workflow cache management enabled"
          echo "Build caches are automatically managed by GitHub Actions"

  # Notification job
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, build-and-push, deploy]
    
    steps:
      - name: Check workflow status
        run: |
          echo "Workflow Status Report"
          echo "========================"
          LINT_STATUS="${{ needs.lint.result }}"
          TEST_STATUS="${{ needs.test.result }}"
          BUILD_STATUS="${{ needs.build-and-push.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          
          echo "Lint: $LINT_STATUS"
          echo "Test: $TEST_STATUS"
          echo "Build: $BUILD_STATUS"
          echo "Deploy: $DEPLOY_STATUS"
          
          if [[ "$LINT_STATUS" == "success" && "$TEST_STATUS" == "success" && "$BUILD_STATUS" == "success" ]]; then
            echo "✅ All quality checks passed!"
          else
            echo "⚠️ Some checks failed or were skipped"
          fi

      - name: Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "ℹ️ SLACK_WEBHOOK_URL is not set; skipping Slack notification."
            exit 0
          fi
          
          LINT_STATUS="${{ needs.lint.result }}"
          TEST_STATUS="${{ needs.test.result }}"
          BUILD_STATUS="${{ needs.build-and-push.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          
          OVERALL_STATUS="✅ Success"
          if [[ "$LINT_STATUS" != "success" || "$TEST_STATUS" != "success" ]]; then
            OVERALL_STATUS="❌ Failed"
          fi
          
          STATUS_DETAILS="Lint: $LINT_STATUS | Test: $TEST_STATUS | Build: $BUILD_STATUS | Deploy: $DEPLOY_STATUS"
          
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"🚀 Portfolio Manager CI/CD Pipeline\n${OVERALL_STATUS}\n${STATUS_DETAILS}\n🔗 Branch: ${{ github.ref }}\n📝 Commit: ${{ github.sha }}\"}" \
            "$SLACK_WEBHOOK_URL" || true

      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo "CI/CD Pipeline Execution Summary"
          echo "=========================================="
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Event: ${{ github.event_name }}"
          echo "=========================================="
          echo "Job Results:"
          echo "  • Code Quality (Lint): ${{ needs.lint.result }}"
          echo "  • Tests: ${{ needs.test.result }}"
          echo "  • Build & Push: ${{ needs.build-and-push.result }}"
          echo "  • Deploy: ${{ needs.deploy.result }}"
          echo "=========================================="
