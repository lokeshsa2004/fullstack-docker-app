version: '3.9'

# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio_network

  app:
    environment:
      DEBUG: "False"
      LOG_LEVEL: "WARNING"
      DATABASE_ECHO: "False"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - portfolio_network

  nginx:
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - portfolio_network

volumes:
  postgres_data:
    driver: local

networks:
  portfolio_network:
    driver: bridge
